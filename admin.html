<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>
<div id="orders"></div>

<script>

function load(){
fetch("/orders")
.then(res=>res.json())
.then(data=>{

let box=document.getElementById("orders");
box.innerHTML="";

data.forEach(o=>{
box.innerHTML+=`
<div style="border:1px solid black;margin:10px;padding:10px">
<p>${o.user} - ${o.product}</p>
<p>Status: ${o.status}</p>

<input id="r${o.id}" placeholder="Result">
<button onclick="approve(${o.id})">Approve</button>
</div>
`;
});

});
}

function approve(id){
let val=document.getElementById("r"+id).value;

fetch("/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,result:val})
})
.then(load);
}

load();

</script>

</body>
</html>
